<aeva-doc-page title="Button"
    description="The button component is a fundamental interactive element that allows users to perform actions. It supports multiple visual variants, sizes, and icon integration.">

    <aeva-doc-section title="Primary Variants"
        description="Use the <span class='property-tag'>variant</span> property to change the visual importance.">
        <aeva-doc-example code='<aeva-button variant="primary">Primary</aeva-button>'>
            <aeva-button variant="primary">Primary Button</aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button variant="secondary">Secondary</aeva-button>'>
            <aeva-button variant="secondary">Secondary Button</aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button variant="ghost">Ghost</aeva-button>'>
            <aeva-button variant="ghost">Ghost Button</aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button variant="danger">Danger</aeva-button>'>
            <aeva-button variant="danger">Danger Button</aeva-button>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Sizes"
        description="Use the <span class='property-tag'>size</span> property to adjust the button's scale for different contexts.">
        <aeva-doc-example code='<aeva-button size="sm">Small</aeva-button>'>
            <aeva-button size="sm">Small Button</aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button size="md">Medium</aeva-button>'>
            <aeva-button size="md">Medium Button</aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button size="lg">Large</aeva-button>'>
            <aeva-button size="lg">Large Button</aeva-button>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Icon Integration"
        description="Enhance buttons with icons or use the <span class='property-tag'>icon-only</span> variant.">
        <aeva-doc-example code='<aeva-button icon-left="search">Search</aeva-button>'>
            <aeva-button>
                <svg slot="icon-left" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                Search
            </aeva-button>
        </aeva-doc-example>

        <aeva-doc-example code='<aeva-button icon-only>...</aeva-button>'>
            <aeva-button icon-only>
                <svg slot="icon-only" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M12 4v16m8-8H4"></path>
                </svg>
            </aeva-button>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Customization" columns="1"
        description="Adjust button appearance using CSS Custom Properties.">
        <aeva-doc-example language="css" code="aeva-button {
    --aeva-button-primary-bg: #8e44ad;
    --aeva-button-border-radius: 4px;
    --aeva-button-font-weight: 700;
}">
            <aeva-button
                style="--aeva-button-primary-bg: #8e44ad; --aeva-button-border-radius: 4px; --aeva-button-font-weight: 700;">
                Custom Button
            </aeva-button>
        </aeva-doc-example>
    </aeva-doc-section>

</aeva-doc-page>
