<aeva-doc-page title="Kinetic Text"
    description="A sensory UI typography component showcasing 2026 digital texture. Headlines stretch, liquify, and 'dance' reactively to touch or gaze proximity.">

    <aeva-doc-section title="Liquid Typography"
        description="This component uses dynamic physics to stretch individual characters based on pointer proximity, giving the illusion of a living, breathing interface.">

        <aeva-doc-example code='<aeva-kinetic-text text="Sensory UI" variant="hero"></aeva-kinetic-text>'>
            <div
                style="display: flex; gap: 2rem; padding: 4rem 2rem; justify-content: center; align-items: center; border-radius: 1rem; flex-direction: column;">
                <aeva-kinetic-text text="Sensory UI" variant="hero"></aeva-kinetic-text>
                <aeva-text variant="body" state="muted" style="margin-top: -1rem;">Hover over the text to feel the
                    texture.</aeva-text>

                <aeva-kinetic-text text="Variant H4 looks like this" variant="h4"></aeva-kinetic-text>
                <aeva-kinetic-text text="Variant body looks like this" variant="body"></aeva-kinetic-text>
                <aeva-text variant="body" state="muted" style="margin-top: -1rem;">Hover over the text to feel the
                    texture.</aeva-text>
            </div>
        </aeva-doc-example>

    </aeva-doc-section>
</aeva-doc-page>
