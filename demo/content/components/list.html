<aeva-doc-page title="List"
    description="A flexible container for vertical collections of related information items. Supports icons, descriptions, and interactive states.">
    <aeva-doc-section title="Basic Usage" description="Simple list with labels.">
        <aeva-doc-example>
            <aeva-card padding="none"
                style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 300px;">
                <aeva-list>
                    <aeva-list-item label="Profile Settings"></aeva-list-item>
                    <aeva-list-item label="Notifications"></aeva-list-item>
                    <aeva-list-item label="Security & Privacy"></aeva-list-item>
                </aeva-list>
            </aeva-card>
            <div slot="code">
                <aeva-list>
                    <aeva-list-item label="Profile Settings"></aeva-list-item>
                    <aeva-list-item label="Notifications"></aeva-list-item>
                    <aeva-list-item label="Security & Privacy"></aeva-list-item>
                </aeva-list>
            </div>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Icons & Descriptions"
        description="Enhance list items with leading/trailing icons and secondary text.">
        <aeva-doc-example>
            <aeva-card padding="none"
                style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px;">
                <aeva-list active="0">
                    <aeva-list-item label="Inbox">
                        <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                        </svg>
                        <aeva-badge slot="icon-right" size="sm">12</aeva-badge>
                    </aeva-list-item>
                    <aeva-list-item label="Sent">
                        <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </aeva-list-item>
                    <aeva-list-item label="Trash">
                        <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        <span slot="description">Automatically deleted after 30 days</span>
                    </aeva-list-item>
                </aeva-list>
            </aeva-card>
            <div slot="code">
                <aeva-list active="0">
                    <aeva-list-item label="Inbox">
                        <svg slot="icon-left" ...></svg>
                        <aeva-badge slot="icon-right">12</aeva-badge>
                    </aeva-list-item>
                    <aeva-list-item label="Trash">
                        <svg slot="icon-left" ...></svg>
                        <span slot="description">Secondary text here</span>
                    </aeva-list-item>
                </aeva-list>
            </div>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Icon Only Mode"
        description="Circular list items displaying only icons, useful for compact sidebars.">
        <aeva-doc-example>
            <div
                style="display: flex; gap: 1rem; background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 50px;">
                <aeva-list-item icon-only active>
                    <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                </aeva-list-item>
                <aeva-list-item icon-only>
                    <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </aeva-list-item>
                <aeva-list-item icon-only>
                    <svg slot="icon-left" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </aeva-list-item>
            </div>
            <div slot="code">
                <aeva-list-item icon-only active>
                    <svg slot="icon-left" ...></svg>
                </aeva-list-item>
            </div>
        </aeva-doc-example>
    </aeva-doc-section>
</aeva-doc-page>
