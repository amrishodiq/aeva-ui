<aeva-doc-page title="Membrane Input"
    description="A tactile input utility that simulates an elastic membrane. It reacts to typing with physical pulses and visual ripples, making data entry feel organic and responsive.">

    <aeva-doc-section title="Tactile Feedback"
        description="Type in the field below to experience the membrane effect. Each keystroke triggers a physics-based pulse and a visual ripple.">

        <aeva-doc-example code='<aeva-membrane-input placeholder="Type something..."></aeva-membrane-input>'>
            <div style="max-width: 400px; margin: 0 auto; padding: 2rem;">
                <aeva-membrane-input placeholder="Type to feel the membrane..."></aeva-membrane-input>
            </div>
        </aeva-doc-example>

    </aeva-doc-section>

    <aeva-doc-section title="Usage"
        description="Membrane Input is a drop-in replacement for standard inputs when you want to elevate the tactile experience.">
        <aeva-code>
            &lt;aeva-membrane-input
            placeholder="Enter your name"
            value="John Doe"&gt;
            &lt;/aeva-membrane-input&gt;
        </aeva-code>
    </aeva-doc-section>

</aeva-doc-page>
