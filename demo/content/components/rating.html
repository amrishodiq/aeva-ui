<aeva-doc-page title="Rating"
    description="Star-based rating component with support for half-stars, labels, and interactive modes. Perfect for user feedback and reviews.">

    <aeva-doc-section title="Basic Rating" description="Standard read-only rating display.">
        <aeva-doc-example code='<aeva-rating value="4" show-label></aeva-rating>
<aeva-rating value="3.5" allow-half></aeva-rating>'>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <aeva-rating value="4" show-label></aeva-rating>
                <aeva-rating value="3.5" allow-half></aeva-rating>
            </div>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Interactive Mode" description="Allow users to provide feedback by clicking stars.">
        <aeva-doc-example code='<aeva-rating interactive value="0" max="5" show-label></aeva-rating>'>
            <aeva-rating interactive value="0" max="5" show-label></aeva-rating>
            <div style="margin-top: 0.5rem; font-size: 0.8rem; opacity: 0.6; color: white;">Try clicking or hovering
                over the stars!</div>
        </aeva-doc-example>
    </aeva-doc-section>

    <aeva-doc-section title="Sizes" description="Available in multiple sizes to fit your UI.">
        <aeva-doc-example code='<aeva-rating size="sm" value="5"></aeva-rating>
<aeva-rating size="md" value="5"></aeva-rating>
<aeva-rating size="lg" value="5"></aeva-rating>'>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <aeva-rating size="sm" value="5"></aeva-rating>
                <aeva-rating size="md" value="5"></aeva-rating>
                <aeva-rating size="lg" value="5"></aeva-rating>
            </div>
        </aeva-doc-example>
    </aeva-doc-section>

</aeva-doc-page>
