<aeva-bento-grid preset="feature">
    <!-- Interactive Demo Card -->
    <aeva-card padding="lg" style="grid-column: span 2; grid-row: span 2;">
        <div slot="header">
            <aeva-text variant="h3">Interactive Playground</aeva-text>
        </div>
        <div>
            <aeva-text variant="body" style="margin-bottom: 1rem;">
                Try out our components in real-time. Click the buttons below to see them in action!
            </aeva-text>

            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                <aeva-button variant="primary">Primary</aeva-button>
                <aeva-button variant="secondary">Secondary</aeva-button>
                <aeva-button variant="ghost">Ghost</aeva-button>
                <aeva-button variant="text">Text</aeva-button>
            </div>

            <div style="margin-top: 1.5rem;">
                <aeva-progress value="75" max="100"></aeva-progress>
            </div>
        </div>
    </aeva-card>

    <!-- Component Showcase 1 -->
    <aeva-card padding="lg">
        <div slot="header">
            <aeva-text variant="h3">Buttons</aeva-text>
        </div>
        <div>
            <aeva-text variant="body">
                Explore our button variants and styles.
            </aeva-text>
        </div>
    </aeva-card>

    <!-- Component Showcase 2 -->
    <aeva-card padding="lg">
        <div slot="header">
            <aeva-text variant="h3">Cards</aeva-text>
        </div>
        <div>
            <aeva-text variant="body">
                Flexible card components for any layout.
            </aeva-text>
        </div>
    </aeva-card>

    <!-- Component Showcase 3 -->
    <aeva-card padding="lg">
        <div slot="header">
            <aeva-text variant="h3">Forms</aeva-text>
        </div>
        <div>
            <aeva-text variant="body">
                Beautiful and accessible form components.
            </aeva-text>
        </div>
    </aeva-card>
</aeva-bento-grid>
